plugins {
    id 'com.android.application'
    id 'com.huawei.agconnect'
}

repositories {
    google()
    mavenCentral()
    maven { url 'https://developer.huawei.com/repo/' }
}

android {
    compileSdk 34
    namespace 'com.yourdictionary.app'

    defaultConfig {
        applicationId "com.yourdictionary.app"
        minSdk 21
        targetSdk 34
        versionCode 3
        versionName "1.2"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    // Huawei HMS Ads — replaces AdMob entirely
    implementation 'com.huawei.hms:ads-lite:13.4.66.300'
    // Huawei AGConnect core (required for agconnect-services.json)
    implementation 'com.huawei.agconnect:agconnect-core:1.9.1.301'
}
