name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create launcher icons
        run: |
          mkdir -p app/src/main/res/mipmap-ldpi app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi
          echo "iVBORw0KGgoAAAANSUhEUgAAACQAAAAkCAIAAABuYg/PAAAAIklEQVR4nO3DAQ0AAAgDoOcznfXexgJGgI3MNqqqqqqqzwOA5ZqpHQGuWAAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-ldpi/ic_launcher.png
          echo "iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAIAAADYYG7QAAAAJUlEQVR4nO3DAQkAAAgDsOcznfXexhzCBstso6qqqqqqqqqqvnw+v0vi7eutCAAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAEgAAABICAIAAADajyQQAAAAMUlEQVR4nO3DMQ0AAAgDsOlDHfbmBhV8bdLMNqqqqqqqqqqqqqqqqqqqqqqqqqqqjw8M92q/Liqk1QAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAGAAAABgCAIAAABt+uBvAAAAQElEQVR4nO3DAQ0AAAgDoOcznfXexh4ONjLbqKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqrq8weTki+UlMPe1QAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAJAAAACQCAIAAABoJHXvAAAAbUlEQVR4nO3DMQ0AAAgDsOlDHfbmBhk8bdLMNqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqvj3ILKsIQevvRQAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          for d in ldpi mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp app/src/main/res/mipmap-$d/ic_launcher.png app/src/main/res/mipmap-$d/ic_launcher_round.png
          done

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias yourdictionary \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore app/yourdictionary.jks \
            -storepass YourDict2024! \
            -keypass YourDict2024! \
            -dname "CN=YourDictionary, OU=App, O=YourDictionary, L=Algiers, ST=Algeria, C=DZ" \
            -noprompt

      - name: Build Release APK
        working-directory: app
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=yourdictionary.jks \
            -Pandroid.injected.signing.store.password=YourDict2024! \
            -Pandroid.injected.signing.key.alias=yourdictionary \
            -Pandroid.injected.signing.key.password=YourDict2024!

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: YourDictionary-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90
