name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create launcher icons
        run: |
          mkdir -p app/src/main/res/mipmap-ldpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          cat > /tmp/mkicon.py << 'PYEOF'
          import struct, zlib, sys
          size = int(sys.argv[1])
          path = sys.argv[2]
          def chunk(n, d):
              return struct.pack('>I', len(d)) + n + d + struct.pack('>I', zlib.crc32(n+d) & 0xffffffff)
          ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
          row = b'\x00' + bytes([74, 144, 217]) * size
          idat = zlib.compress(row * size)
          png = b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
          open(path, 'wb').write(png)
          PYEOF
          python3 /tmp/mkicon.py 36 app/src/main/res/mipmap-ldpi/ic_launcher.png
          python3 /tmp/mkicon.py 48 app/src/main/res/mipmap-mdpi/ic_launcher.png
          python3 /tmp/mkicon.py 72 app/src/main/res/mipmap-hdpi/ic_launcher.png
          python3 /tmp/mkicon.py 96 app/src/main/res/mipmap-xhdpi/ic_launcher.png
          python3 /tmp/mkicon.py 144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          python3 /tmp/mkicon.py 192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          for d in ldpi mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp app/src/main/res/mipmap-$d/ic_launcher.png app/src/main/res/mipmap-$d/ic_launcher_round.png
          done

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YourDictionary-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
