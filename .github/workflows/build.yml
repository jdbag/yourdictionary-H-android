name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create launcher icons
        run: |
          mkdir -p app/src/main/res/mipmap-ldpi
          printf "%s" "" | base64 -d > app/src/main/res/mipmap-ldpi/ic_launcher.png
          cp app/src/main/res/mipmap-ldpi/ic_launcher.png app/src/main/res/mipmap-ldpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-mdpi
          printf "%s" "" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-hdpi
          printf "%s" "" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-xhdpi
          printf "%s" "" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-xxhdpi
          printf "%s" "" | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          printf "%s" "" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias yourdictionary \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore $GITHUB_WORKSPACE/app/yourdictionary.jks \
            -storepass YourDict2024! -keypass YourDict2024! \
            -dname "CN=YourDictionary,O=YourDictionary,C=DZ" \
            -noprompt
          echo "JKS_PATH=$GITHUB_WORKSPACE/app/yourdictionary.jks" >> $GITHUB_ENV

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: YourDictionary-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90
