name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create launcher icons
        run: |
          mkdir -p app/src/main/res/mipmap-ldpi
          printf "%s" "iVBORw0KGgoAAAANSUhEUgAAACQAAAAkCAIAAABuYg/PAAAALUlEQVR42u3NMQ0AAAgDsOlDHfZwgwsO0qR/Uz1nIpPJZDKZTCaTyWQy2Z9sAcw2mqkTjZhvAAAAAElFTkSuQmCC" | base64 -d > app/src/main/res/mipmap-ldpi/ic_launcher.png
          cp app/src/main/res/mipmap-ldpi/ic_launcher.png app/src/main/res/mipmap-ldpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-mdpi
          printf "%s" "iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAIAAADYYG7QAAAAOklEQVR42u3OQQ0AAAgEoMtnOuvZxhbOBxsBSPW8EiEhISEhISEhISEhISEhISEhISEhISEhISGhOwvK5kvihygBfwAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-hdpi
          printf "%s" "iVBORw0KGgoAAAANSUhEUgAAAEgAAABICAIAAADajyQQAAAAWklEQVR42u3PAQ0AAAgDoOcznfVsYw4dGwVI9bwUMTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMbGrFvlyar/6Os+cAAAAAElFTkSuQmCC" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-xhdpi
          printf "%s" "iVBORw0KGgoAAAANSUhEUgAAAGAAAABgCAIAAABt+uBvAAAAjklEQVR42u3QMQ0AAAgDsOlDHfZwgwNOriZV0FQPhygQJEiQIEGCBAlCkCBBggQJEiQIQYIECRIkSJAgBAkSJEiQIEGCBCFIkCBBggQJEoQgQYIECRIkSBCCBAkSJEiQIEGCECRIkCBBggQJQpAgQYIECRIkCEGCBAkSJEiQIEEIEiRIkCBBggQhSJCgPwvT0i+UljGOLQAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-xxhdpi
          printf "%s" "" | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          printf "%s" "" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias yourdictionary \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore app/yourdictionary.jks \
            -storepass YourDict2024! -keypass YourDict2024! \
            -dname "CN=YourDictionary,O=YourDictionary,C=DZ" \
            -noprompt

      - name: Build Release APK
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=yourdictionary.jks \
            -Pandroid.injected.signing.store.password=YourDict2024! \
            -Pandroid.injected.signing.key.alias=yourdictionary \
            -Pandroid.injected.signing.key.password=YourDict2024!

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: YourDictionary-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90
